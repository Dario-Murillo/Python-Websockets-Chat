<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RELAY — Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- LOBBY SCREEN -->
    <div id="lobby" class="screen active">
      <div class="lobby-inner">
        <div class="brand">
          <span class="brand-dot"></span>
          <h1>RELAY</h1>
        </div>
        <p class="tagline">Real-time. No noise.</p>

        <form id="joinForm" class="join-form">
          <div class="field">
            <label for="usernameInput">YOUR HANDLE</label>
            <input type="text" id="usernameInput" placeholder="e.g. ghost_99" maxlength="20" autocomplete="off" />
          </div>
          <div class="field">
            <label for="roomInput">ROOM ID</label>
            <input type="text" id="roomInput" placeholder="e.g. general" maxlength="30" autocomplete="off" />
          </div>
          <button type="submit" class="btn-join">
            <span>JOIN ROOM</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </form>

        <div id="lobbyError" class="error-msg hidden">Fill in both fields to continue.</div>
      </div>

      <div class="lobby-bg">
        <div class="grid-lines"></div>
      </div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat" class="screen">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <span class="brand-dot small"></span>
          RELAY
        </div>

        <div class="sidebar-section">
          <div class="section-label">ROOM</div>
          <div class="current-room">
            <span class="room-hash">#</span>
            <span id="roomLabel">—</span>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-label">YOU</div>
          <div class="user-pill">
            <span class="user-status"></span>
            <span id="userLabel">—</span>
          </div>
        </div>

        <div class="sidebar-section members-section">
          <div class="section-label">ONLINE</div>
          <ul id="memberList" class="member-list"></ul>
        </div>

        <button id="leaveBtn" class="btn-leave">← LEAVE</button>
      </aside>

      <main class="chat-main">
        <header class="chat-header">
          <div class="header-room">
            <span class="room-hash">#</span><span id="headerRoom">—</span>
          </div>
          <div id="connectionStatus" class="conn-status connecting">
            <span class="status-dot"></span>
            <span class="status-text">connecting</span>
          </div>
        </header>

        <div id="messages" class="messages"></div>

        <form id="messageForm" class="message-form">
          <input
            type="text"
            id="messageInput"
            placeholder="Send a message…"
            autocomplete="off"
            maxlength="500"
          />
          <button type="submit" class="btn-send" aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 9L16 2L9 16L8 10L2 9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </button>
        </form>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
