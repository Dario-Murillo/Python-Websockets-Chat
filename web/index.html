<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RELAY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()">

  <!-- ── AUTH SCREEN ─────────────────────────────────── -->
  <div class="auth-screen" x-show="screen === 'auth'" x-transition:enter="fade-in">
    <div class="auth-bg">
      <div class="scanlines"></div>
    </div>

    <div class="auth-panel">
      <div class="auth-brand">
        <span class="relay-wordmark">RELAY</span>
        <span class="relay-version">v2.0</span>
      </div>
      <p class="auth-sub">encrypted · real-time · minimal</p>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="tab" :class="{ active: authMode === 'login' }" @click="authMode = 'login'; error = ''">LOGIN</button>
        <button class="tab" :class="{ active: authMode === 'register' }" @click="authMode = 'register'; error = ''">REGISTER</button>
        <div class="tab-indicator" :class="authMode"></div>
      </div>

      <!-- Login form -->
      <form x-show="authMode === 'login'" @submit.prevent="login()" class="auth-form">
        <div class="field">
          <label>USERNAME</label>
          <input type="text" x-model="loginData.username" placeholder="your_handle" autocomplete="username" />
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" x-model="loginData.password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="form-error" x-show="error" x-text="error"></div>
        <button type="submit" class="btn-primary" :disabled="isLoading">
          <span x-show="!isLoading">ENTER →</span>
          <span x-show="isLoading" class="spinner"></span>
        </button>
      </form>

      <!-- Register form -->
      <form x-show="authMode === 'register'" @submit.prevent="register()" class="auth-form">
        <div class="field">
          <label>USERNAME</label>
          <input type="text" x-model="registerData.username" placeholder="your_handle" autocomplete="username" />
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" x-model="registerData.password" placeholder="min. 8 characters" autocomplete="new-password" />
        </div>
        <div class="form-error" x-show="error" x-text="error"></div>
        <button type="submit" class="btn-primary" :disabled="isLoading">
          <span x-show="!isLoading">CREATE ACCOUNT →</span>
          <span x-show="isLoading" class="spinner"></span>
        </button>
      </form>
    </div>
  </div>

  <!-- ── ROOMS SCREEN ────────────────────────────────── -->
  <div class="rooms-screen" x-show="screen === 'rooms'" x-transition:enter="fade-in">
    <header class="rooms-header">
      <div class="rooms-brand">
        <span class="relay-wordmark small">RELAY</span>
        <span class="online-badge">
          <span class="pulse-dot"></span>
          LIVE
        </span>
      </div>
      <div class="user-info">
        <span class="user-chip">
          <span class="user-dot"></span>
          <span x-text="currentUser"></span>
        </span>
        <button class="btn-logout" @click="logout()">LOGOUT</button>
      </div>
    </header>

    <main class="rooms-main">
      <div class="rooms-title">
        <h2>CHANNELS</h2>
        <p>Select a room to join the conversation</p>
      </div>

      <div class="rooms-grid">
        <template x-for="room in rooms" :key="room.id">
          <button class="room-card" @click="joinRoom(room)">
            <div class="room-card-top">
              <span class="room-hash">#</span>
              <span class="room-badge" x-text="room.topic"></span>
            </div>
            <div class="room-name" x-text="room.name"></div>
            <div class="room-desc" x-text="room.description"></div>
            <div class="room-card-footer">
              <span>ENTER ROOM →</span>
            </div>
          </button>
        </template>
      </div>
    </main>
  </div>

  <!-- ── CHAT SCREEN ─────────────────────────────────── -->
  <div class="chat-screen" x-show="screen === 'chat'" x-transition:enter="fade-in">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <span class="relay-wordmark small">RELAY</span>
        </div>

        <div class="sidebar-section">
          <div class="section-label">CHANNEL</div>
          <div class="current-room">
            <span class="room-hash">#</span>
            <span x-text="activeRoom?.name"></span>
          </div>
          <div class="room-topic" x-text="activeRoom?.description"></div>
        </div>

        <div class="sidebar-section">
          <div class="section-label">SIGNED IN AS</div>
          <div class="user-pill">
            <span class="user-dot"></span>
            <span x-text="currentUser"></span>
          </div>
        </div>

        <div class="sidebar-section members-section">
          <div class="section-label">ONLINE (<span x-text="members.size"></span>)</div>
          <ul class="member-list">
            <template x-for="member in [...members]" :key="member">
              <li :class="{ self: member === currentUser }">
                <span class="member-dot"></span>
                <span x-text="member === currentUser ? member + ' (you)' : member"></span>
              </li>
            </template>
          </ul>
        </div>
      </div>

      <div class="sidebar-bottom">
        <button class="btn-back" @click="leaveRoom()">← ALL ROOMS</button>
        <button class="btn-logout-sm" @click="logout()">LOGOUT</button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <div class="chat-header-left">
          <span class="room-hash">#</span>
          <span class="chat-room-name" x-text="activeRoom?.name"></span>
        </div>
        <div class="conn-status" :class="wsStatus">
          <span class="status-dot"></span>
          <span class="status-label" x-text="wsStatus"></span>
        </div>
      </header>

      <div class="messages" x-ref="messages">
        <template x-for="(msg, index) in messages" :key="index">
          <div class="msg" :class="{ own: msg.own, system: msg.system }">
            <template x-if="!msg.system">
              <div class="msg-meta">
                <span class="msg-author" x-text="msg.author"></span>
                <span class="msg-time" x-text="msg.time"></span>
              </div>
            </template>
            <template x-if="!msg.system">
              <div class="msg-divider"></div>
            </template>
            <div class="msg-text" x-text="msg.text"></div>
          </div>
        </template>
        <div x-show="messages.length === 0" class="empty-state">
          No messages yet. Say something.
        </div>
      </div>

      <form class="message-form" @submit.prevent="sendMessage()">
        <input
          type="text"
          x-model="messageText"
          :placeholder="'Message #' + (activeRoom?.name ?? '')"
          autocomplete="off"
          maxlength="500"
          x-ref="messageInput"
        />
        <button type="submit" class="btn-send">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 9L16 2L9 16L8 10L2 9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
